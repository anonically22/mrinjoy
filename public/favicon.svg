<svg width="512" height="512" viewBox="20 20 160 230" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .primary-stroke { stroke: #1D232B; }
        .primary-fill { fill: #1D232B; }
        .accent-fill { fill: #C9A35A; }
        @media (prefers-color-scheme: dark) {
            .primary-stroke { stroke: #F8F6F2; }
            .primary-fill { fill: #F8F6F2; }
        }
    </style>
    <!-- ICON -->
    <g>
        <!-- Outer Shape -->
        <path d="M100 20
                 C45 20 20 60 20 105
                 L20 250
                 L180 250
                 L180 105
                 C180 60 155 20 100 20Z"
              class="primary-stroke"
              stroke-width="8"
              fill="none"/>

        <!-- Sun -->
        <circle cx="135" cy="80" r="16" class="accent-fill"/>

        <!-- Bridge -->
        <line x1="100" y1="75" x2="100" y2="150"
              class="primary-stroke" stroke-width="8"
              stroke-linecap="round"/>

        <line x1="100" y1="85" x2="35" y2="130"
              class="primary-stroke" stroke-width="5"/>
        <line x1="100" y1="95" x2="35" y2="145"
              class="primary-stroke" stroke-width="5"/>
        <line x1="100" y1="105" x2="35" y2="160"
              class="primary-stroke" stroke-width="5"/>

        <line x1="100" y1="85" x2="165" y2="130"
              class="primary-stroke" stroke-width="5"/>
        <line x1="100" y1="95" x2="165" y2="145"
              class="primary-stroke" stroke-width="5"/>
        <line x1="100" y1="105" x2="165" y2="160"
              class="primary-stroke" stroke-width="5"/>

        <!-- Divider -->
        <line x1="20" y1="165" x2="180" y2="165"
              class="primary-stroke" stroke-width="6"/>

        <!-- Gateway Arch -->
        <path d="M75 250
                 L75 190
                 C75 165 90 150 100 150
                 C110 150 125 165 125 190
                 L125 250"
              class="primary-stroke"
              stroke-width="8"
              fill="none"/>

        <!-- Side Pillars -->
        <line x1="50" y1="250" x2="50" y2="200"
              class="primary-stroke"
              stroke-width="12"
              stroke-linecap="round"/>

        <line x1="150" y1="250" x2="150" y2="200"
              class="primary-stroke"
              stroke-width="12"
              stroke-linecap="round"/>

        <!-- Inner Door -->
        <path d="M88 250
                 L88 210
                 C88 195 95 185 100 185
                 C105 185 112 195 112 210
                 L112 250"
              class="primary-stroke"
              stroke-width="5"
              fill="none"/>
    </g>
</svg>